<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcul Covoiturage - Tarif véhicule</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; }
        input, button { margin: 10px 0; padding: 8px; width: 100%; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #45a049; }
        .voiture-input { background-color: #f9f9f9; padding: 10px; margin: 10px 0; border-radius: 5px; border-left: 4px solid #4CAF50; }
        .voiture-input label { display: inline-block; width: auto; margin-right: 10px; }
        .voiture-input input { width: 80px; display: inline-block; margin: 0; }
        #gratuitSection { margin-top: 15px; display: none; }
        #resultat { margin-top: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .prix { font-size: 28px; font-weight: bold; color: #4CAF50; margin: 15px 0; text-align: center; }
        .info { background-color: #e7f3fe; padding: 8px; margin: 10px 0; border-radius: 5px; }
        .recap { background-color: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .recap-item { padding: 5px 0; border-bottom: 1px solid #ddd; }
        .recap-item:last-child { border-bottom: none; }
        .positif { color: #5cb85c; font-weight: bold; }
        .negatif { color: #d9534f; font-weight: bold; }
        .reversement-item { background-color: #fff3e0; padding: 8px; margin: 5px 0; border-radius: 5px; border-left: 4px solid #ff9800; }
        h3 { margin: 0 0 10px 0; color: #333; }
        .error { color: #d9534f; font-weight: bold; }
        .warning { background-color: #fff3cd; color: #856404; padding: 8px; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Calcul Covoiturage - Tarification par véhicule</h1>
    <div>
        <label for="randonneurs">Nombre de randonneurs :</label>
        <input type="number" id="randonneurs" placeholder="ex: 14">
    </div>
    <div>
        <label for="kilometres">Kilomètres (aller-retour) :</label>
        <input type="number" id="kilometres" placeholder="ex: 62">
    </div>
    <div>
        <label for="prixKm">Tarif véhicule par km (€) :</label>
        <input type="number" id="prixKm" value="0.40" step="0.01" min="0">
    </div>
    <div>
        <label>
            <input type="checkbox" id="gratuitCheckbox"> Présence de passagers gratuits (accompagnateurs sans frais)
        </label>
    </div>
    <div id="gratuitSection">
        <p>Pour chaque voiture, indiquez le nombre de passagers qui ne paient pas :</p>
        <div id="voituresGratuit"></div>
    </div>
    <button onclick="calculer()">Calculer</button>
    <div id="resultat"></div>

    <script>
        function euroToCents(euro) { return Math.round(euro * 100); }
        function centsToEuro(cents) { return cents / 100; }

        function repartirPersonnesParVoiture(total, capacite = 5) {
            const nVoitures = Math.ceil(total / capacite);
            let repartition = new Array(nVoitures).fill(Math.floor(total / nVoitures));
            let reste = total % nVoitures;
            for (let i = 0; i < reste; i++) repartition[i]++;
            return repartition;
        }

        // Met à jour l'affichage des champs de gratuits en fonction du nombre de randonneurs
        function updateGratuitFields() {
            const randonneursInput = document.getElementById("randonneurs");
            let randonneurs = parseInt(randonneursInput.value);
            if (isNaN(randonneurs) || randonneurs < 1) {
                // Afficher un message d'avertissement dans la section
                const container = document.getElementById("voituresGratuit");
                container.innerHTML = `<div class="warning">Veuillez d'abord saisir un nombre valide de randonneurs.</div>`;
                return;
            }
            const personnesParVoiture = repartirPersonnesParVoiture(randonneurs, 5);
            const container = document.getElementById("voituresGratuit");
            container.innerHTML = "";
            for (let i = 0; i < personnesParVoiture.length; i++) {
                const nbPers = personnesParVoiture[i];
                const maxGratuits = nbPers - 1; // pas plus que le nombre de passagers
                const div = document.createElement("div");
                div.className = "voiture-input";
                div.innerHTML = `
                    <label>Voiture ${i+1} (${nbPers} personnes) :</label>
                    <input type="number" id="gratuit_${i}" value="0" min="0" max="${maxGratuits}" step="1">
                    <span> passagers gratuits (max ${maxGratuits})</span>
                `;
                container.appendChild(div);
            }
        }

        // Gère l'affichage de la section et la mise à jour des champs
        const checkbox = document.getElementById("gratuitCheckbox");
        const section = document.getElementById("gratuitSection");
        const randonneursInput = document.getElementById("randonneurs");

        function toggleGratuitSection() {
            if (checkbox.checked) {
                section.style.display = "block";
                updateGratuitFields();
            } else {
                section.style.display = "none";
            }
        }

        checkbox.addEventListener("change", toggleGratuitSection);
        randonneursInput.addEventListener("input", function() {
            if (checkbox.checked) {
                updateGratuitFields();
            }
        });
        // Au chargement, si la case est déjà cochée (par défaut non, mais on gère)
        toggleGratuitSection();

        function reversementsMultiples(donneursCents, receveursCents) {
            let transferts = [];
            let d = donneursCents.map(d => ({ voiture: d.voiture, montant: d.montant }));
            let r = receveursCents.map(r => ({ voiture: r.voiture, montant: r.montant }));
            let i = 0, j = 0;
            while (i < d.length && j < r.length) {
                const montant = Math.min(d[i].montant, r[j].montant);
                if (montant > 0) {
                    transferts.push({ de: d[i].voiture, vers: r[j].voiture, montantCents: montant });
                    d[i].montant -= montant;
                    r[j].montant -= montant;
                }
                if (d[i].montant === 0) i++;
                if (r[j].montant === 0) j++;
            }
            return transferts;
        }

        function reversementsSimples(donneursCents, receveursCents, seuilCents = 50) {
            let transferts = [];
            let d = donneursCents.map(d => ({ voiture: d.voiture, montant: d.montant }));
            let r = receveursCents.map(r => ({ voiture: r.voiture, montant: r.montant }));
            d.sort((a,b) => b.montant - a.montant);
            r.sort((a,b) => b.montant - a.montant);
            
            for (let donneur of d) {
                if (donneur.montant === 0) continue;
                let receveur = r.find(r => r.montant > 0);
                if (!receveur) break;
                const montant = Math.min(donneur.montant, receveur.montant);
                if (montant > 0) {
                    transferts.push({ de: donneur.voiture, vers: receveur.voiture, montantCents: montant });
                    donneur.montant -= montant;
                    receveur.montant -= montant;
                }
            }
            const residuelDonneurs = d.filter(d => d.montant > seuilCents);
            const residuelReceveurs = r.filter(r => r.montant > seuilCents);
            if (residuelDonneurs.length > 0 || residuelReceveurs.length > 0) return null;
            return transferts;
        }

        function calculer() {
            const randonneurs = parseInt(document.getElementById("randonneurs").value);
            const kilometres = parseInt(document.getElementById("kilometres").value);
            const tarifVehicule = parseFloat(document.getElementById("prixKm").value);
            const gratuitActif = checkbox.checked;

            if (isNaN(randonneurs) || randonneurs < 1) {
                document.getElementById("resultat").innerHTML = `<div class="error">Veuillez entrer un nombre valide de randonneurs (≥ 1).</div>`;
                return;
            }
            if (isNaN(kilometres) || kilometres <= 0) {
                document.getElementById("resultat").innerHTML = `<div class="error">Veuillez entrer une distance positive (km).</div>`;
                return;
            }
            if (isNaN(tarifVehicule) || tarifVehicule < 0) {
                document.getElementById("resultat").innerHTML = `<div class="error">Veuillez entrer un tarif valide (≥ 0).</div>`;
                return;
            }

            const personnesParVoiture = repartirPersonnesParVoiture(randonneurs, 5);
            const nVoitures = personnesParVoiture.length;
            
            // Récupération des nombres de passagers gratuits par voiture
            let gratuitsParVoiture = [];
            if (gratuitActif) {
                for (let i = 0; i < nVoitures; i++) {
                    const input = document.getElementById(`gratuit_${i}`);
                    let val = input ? parseInt(input.value) : 0;
                    if (isNaN(val)) val = 0;
                    const maxGratuits = personnesParVoiture[i] - 1;
                    if (val > maxGratuits) val = maxGratuits;
                    gratuitsParVoiture.push(val);
                }
            } else {
                gratuitsParVoiture = new Array(nVoitures).fill(0);
            }

            // Calcul du nombre de personnes payantes par voiture : conducteur (1) + passagers payants
            let passagersPayantsParVoiture = [];
            let totalPayants = 0;
            for (let i = 0; i < nVoitures; i++) {
                const nbPers = personnesParVoiture[i];
                const nbPassagers = nbPers - 1;
                const nbGratuits = gratuitsParVoiture[i];
                const nbPassagersPayants = Math.max(0, nbPassagers - nbGratuits);
                passagersPayantsParVoiture.push(nbPassagersPayants);
                totalPayants += 1 + nbPassagersPayants; // conducteur + passagers payants
            }

            if (totalPayants === 0) {
                document.getElementById("resultat").innerHTML = `<div class="error">Aucune personne payante (tous gratuits ?).</div>`;
                return;
            }

            const coutParVoitureCents = euroToCents(kilometres * tarifVehicule);
            const coutTotalCents = nVoitures * coutParVoitureCents;
            
            const montantParPayantCents = Math.round(coutTotalCents / totalPayants);
            const montantParPayantEuro = centsToEuro(montantParPayantCents);

            // Collecte par conducteur (somme des passagers payants)
            let collectesCents = [];
            for (let i = 0; i < nVoitures; i++) {
                const nbPassagersPayants = passagersPayantsParVoiture[i];
                const collecte = nbPassagersPayants * montantParPayantCents;
                collectesCents.push(collecte);
            }

            const totalCollecteCents = collectesCents.reduce((a,b) => a+b, 0);
            const montantCibleParConducteurCents = nVoitures > 0 ? Math.round(totalCollecteCents / nVoitures) : 0;

            let voitures = [];
            for (let i = 0; i < nVoitures; i++) {
                const nbPers = personnesParVoiture[i];
                const nbPassagersPayants = passagersPayantsParVoiture[i];
                const collecteCents = collectesCents[i];
                const ecartCents = collecteCents - montantCibleParConducteurCents;
                voitures.push({
                    voiture: i+1,
                    nbPersonnes: nbPers,
                    nbPassagersPayants: nbPassagersPayants,
                    nbGratuits: gratuitsParVoiture[i],
                    collecteCents: collecteCents,
                    cibleCents: montantCibleParConducteurCents,
                    ecartCents: ecartCents,
                    reverseOutCents: 0,
                    reverseInCents: 0
                });
            }

            // Reversements
            let donneursCents = voitures.filter(v => v.ecartCents > 0).map(v => ({ voiture: v.voiture, montant: v.ecartCents }));
            let receveursCents = voitures.filter(v => v.ecartCents < 0).map(v => ({ voiture: v.voiture, montant: -v.ecartCents }));
            let reversements = [];
            let method = "simple";
            if (donneursCents.length > 0 && receveursCents.length > 0) {
                reversements = reversementsSimples(donneursCents, receveursCents, 50);
                if (reversements === null) {
                    method = "multiple";
                    reversements = reversementsMultiples(donneursCents, receveursCents);
                }
            }

            for (let t of reversements) {
                const donneur = voitures.find(v => v.voiture === t.de);
                const receveur = voitures.find(v => v.voiture === t.vers);
                if (donneur) {
                    donneur.reverseOutCents += t.montantCents;
                    donneur.ecartCents -= t.montantCents;
                }
                if (receveur) {
                    receveur.reverseInCents += t.montantCents;
                    receveur.ecartCents += t.montantCents;
                }
            }

            for (let v of voitures) {
                v.netRecuCents = v.collecteCents - v.reverseOutCents + v.reverseInCents;
            }

            // Affichage
            let resultHTML = `<h3>📊 Résultat</h3>`;
            resultHTML += `<div class="prix">💰 Chaque personne payante (conducteur ou passager) paie : ${montantParPayantEuro.toFixed(1)} €</div>`;
            resultHTML += `<div class="info">🚗 ${randonneurs} randonneurs → ${nVoitures} voitures<br>`;
            for (let i = 0; i < personnesParVoiture.length; i++) {
                let txt = `V${i+1}: ${personnesParVoiture[i]} pers`;
                if (gratuitActif && gratuitsParVoiture[i] > 0) {
                    txt += ` (dont ${gratuitsParVoiture[i]} gratuit${gratuitsParVoiture[i]>1?'s':''})`;
                }
                resultHTML += txt + " ";
            }
            resultHTML += `<br>💰 Nombre total de payants : ${totalPayants} (conducteurs + passagers payants)`;
            resultHTML += `<br>🎯 Coût total des trajets : ${centsToEuro(coutTotalCents).toFixed(1)} € réparti équitablement.`;
            resultHTML += `<br>🎯 Chaque conducteur doit recevoir de ses passagers (après mutualisation) : ${centsToEuro(montantCibleParConducteurCents).toFixed(1)} €</div>`;

            if (reversements.length > 0) {
                resultHTML += `<h3>🔄 Reversements (méthode ${method === "simple" ? "un donneur → un receveur" : "multiple"})</h3>`;
                for (let rev of reversements) {
                    resultHTML += `<div class="reversement-item">🚗 Voiture ${rev.de} reverse ${(rev.montantCents/100).toFixed(1)} € à la voiture ${rev.vers}</div>`;
                }
                if (method === "multiple") {
                    resultHTML += `<div class="info">ℹ️ La contrainte "un seul reversement par chauffeur" a été levée car l'écart résiduel aurait dépassé 0,50 €.</div>`;
                }
            } else {
                resultHTML += `<div class="info">✅ Aucun reversement nécessaire, chaque conducteur reçoit déjà le montant cible.</div>`;
            }

            resultHTML += `<h3>📋 Montant net reçu par chaque conducteur (après reversements)</h3>`;
            resultHTML += `<div class="recap">`;
            for (let v of voitures) {
                const netEuro = (v.netRecuCents / 100).toFixed(1);
                let details = "";
                if (v.reverseOutCents > 0) details += ` <span class="negatif">(a reversé ${(v.reverseOutCents/100).toFixed(1)} €)</span>`;
                if (v.reverseInCents > 0) details += ` <span class="positif">(a reçu ${(v.reverseInCents/100).toFixed(1)} €)</span>`;
                let passagersInfo = `${v.nbPassagersPayants} passager(s) payant(s)`;
                if (gratuitActif && v.nbGratuits > 0) passagersInfo += ` + ${v.nbGratuits} gratuit(s)`;
                resultHTML += `<div class="recap-item">🚗 Voiture ${v.voiture} (${v.nbPersonnes} pers) : <strong>${netEuro} €</strong> (collecte: ${centsToEuro(v.collecteCents).toFixed(1)} €, cible: ${centsToEuro(v.cibleCents).toFixed(1)} €, ${passagersInfo})${details}</div>`;
            }
            resultHTML += `</div>`;
            
            document.getElementById("resultat").innerHTML = resultHTML;
        }
    </script>
</body>
</html>
